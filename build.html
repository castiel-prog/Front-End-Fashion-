      function renderOutfits(filterCategory = 'all') {
        const container = document.getElementById('outfits-container');
        container.innerHTML = '';

        const filtered = filterCategory === 'all' 
          ? outfits 
          : outfits.filter(outfit => outfit.category === filterCategory);

        filtered.forEach(outfit => {
          const card = document.createElement('div');
          card.className = 'outfit-card';
          const avgPrice = Math.round(outfit.price / outfit.items);
          const categoryLabel = outfit.category.charAt(0).toUpperCase() + outfit.category.slice(1);
          
          let piecesHTML = outfit.pieces.map(piece => 
            `<span class="piece-tag">${piece.name}</span>`
          ).join('');
          
          card.innerHTML = `
            <div class="card-header">
              <span class="category-badge">${categoryLabel}</span>
              <span class="pieces-count">${outfit.items} pieces</span>
            </div>
            <div class="image-container">
              <div class="image" style="background-image: url('${outfit.image}')"></div>
              <div class="image-overlay"></div>
              <div class="image-price-badge">$${outfit.price}</div>
            </div>
            <h3>${outfit.title}</h3>
            <p>${outfit.description}</p>
            <div class="pieces-list">
              ${piecesHTML}
            </div>
            <div class="price-breakdown">
              <div class="price-item">
                <span class="price-label">Total Price</span>
                <span class="price-value">$${outfit.price}</span>
              </div>
              <div class="price-item">
                <span class="price-label">Avg/Item</span>
                <span class="price-value">$${avgPrice}</span>
              </div>
            </div>
            <div class="outfit-actions">
              <button class="outfit-btn" onclick="previewOutfit(${outfit.id})">Preview</button>
              <button class="outfit-btn primary" onclick="addToCart(${outfit.id})">Add to Cart</button>
            </div>
          `;
          container.appendChild(card);
        });
      }

      function filterOutfits(category) {
        document.querySelectorAll('.filter-tab').forEach(tab => {
          tab.classList.remove('active');
        });
        event.target.classList.add('active');

        renderOutfits(category);
      }

      function addToCart(outfitId) {
        const outfit = outfits.find(o => o.id === outfitId);
        cartItems.push({
          id: outfit.id,
          title: outfit.title,
          price: outfit.price
        });
        updateCart();
      }

      function removeFromCart(outfitId) {
        cartItems = cartItems.filter((item, index) => !(item.id === outfitId && cartItems.indexOf(item) === cartItems.lastIndexOf(cartItems.find(x => x.id === outfitId))));
        updateCart();
      }

      function updateCart() {
        const cartCount = cartItems.length;
        document.getElementById('cart-count').textContent = cartCount;

        const cartItemsList = document.getElementById('cart-items-list');
        const checkoutBtn = document.getElementById('checkout-btn');

        if (cartItems.length === 0) {
          cartItemsList.innerHTML = '<div class="cart-empty"><p>Your cart is empty</p></div>';
          document.getElementById('cart-total').textContent = '$0';
          checkoutBtn.disabled = true;
          return;
        }

        cartItemsList.innerHTML = cartItems.map((item, index) => `
          <div class="cart-item">
            <div class="cart-item-title">${item.title}</div>
            <div class="cart-item-price">$${item.price}</div>
            <button class="cart-item-remove" onclick="removeFromCart(${item.id})">Remove</button>
          </div>
        `).join('');

        const total = cartItems.reduce((sum, item) => sum + item.price, 0);
        document.getElementById('cart-total').textContent = '$' + total;
        checkoutBtn.disabled = false;
      }

      function toggleCart() {
        const sidebar = document.getElementById('cart-sidebar');
        const overlay = document.getElementById('cart-overlay');
        sidebar.classList.toggle('open');
        overlay.classList.toggle('open');
      }

      function proceedToCheckout() {
        const total = cartItems.reduce((sum, item) => sum + item.price, 0);
        alert(`Proceeding to checkout!\n\nItems: ${cartItems.length}\nTotal: $${total}\n\nThis will redirect to payment in a full implementation.`);
      }

      function previewOutfit(outfitId) {
        const outfit = outfits.find(o => o.id === outfitId);
        currentPreviewId = outfitId;

        const modal = document.getElementById('preview-modal');
        const previewImage = document.getElementById('preview-image');
        const itemsList = document.getElementById('preview-items-list');
        const svgLines = document.getElementById('connecting-lines');

        previewImage.style.backgroundImage = `url('${outfit.image}')`;
        
        const img = new Image();
        img.onload = function() {
          const aspectRatio = img.naturalWidth / img.naturalHeight;
          const maxWidth = previewImage.parentElement.offsetWidth;
          const calculatedHeight = maxWidth / aspectRatio;
          previewImage.style.height = calculatedHeight + 'px';
          
          svgLines.style.height = calculatedHeight + 'px';
          
          renderConnectingLines(outfit, calculatedHeight);
        };
        img.src = outfit.image;
        
        itemsList.innerHTML = '';
        outfit.pieces.forEach((piece, idx) => {
          const itemDiv = document.createElement('div');
          itemDiv.className = 'preview-item';
          itemDiv.innerHTML = `
            <div class="preview-item-name">${piece.name}</div>
            <div class="preview-item-category">${piece.category}</div>
            <div class="preview-item-price">$${piece.price}</div>
          `;
          itemDiv.onclick = () => highlightPiece(idx);
          itemsList.appendChild(itemDiv);
        });

        modal.classList.add('active');
      }

      function renderConnectingLines(outfit, containerHeight) {
        const svgLines = document.getElementById('connecting-lines');
        svgLines.innerHTML = '';
        const container = document.querySelector('.preview-outfit-image');
        const sidebar = document.querySelector('.preview-sidebar');
        
        document.querySelectorAll('.clothing-dot').forEach(dot => dot.remove());

        outfit.pieces.forEach((piece, idx) => {
          const dotX = (container.offsetWidth * piece.pos.x) / 100;
          const dotY = (container.offsetHeight * piece.pos.y) / 100;

          const dot = document.createElement('div');
          dot.className = 'clothing-dot';
          dot.style.left = (piece.pos.x - 1) + '%';
          dot.style.top = (piece.pos.y - 1) + '%';
          dot.onclick = () => highlightPiece(idx);
          container.appendChild(dot);

          const sidebarItemRect = document.querySelectorAll('.preview-item')[idx].getBoundingClientRect();
          const containerRect = container.getBoundingClientRect();
          const lineStartX = dotX;
          const lineStartY = dotY;
          const lineEndX = sidebarItemRect.left - containerRect.left;
          const lineEndY = sidebarItemRect.top - containerRect.top + sidebarItemRect.height / 2;

          const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          line.setAttribute('x1', lineStartX);
          line.setAttribute('y1', lineStartY);
          line.setAttribute('x2', lineEndX);
          line.setAttribute('y2', lineEndY);
          line.setAttribute('stroke', 'var(--accent)');
          line.setAttribute('stroke-width', '1.5');
          line.setAttribute('opacity', '0.4');
          line.setAttribute('class', 'connecting-line');
          svgLines.appendChild(line);
        });
      }

      function highlightPiece(idx) {
        document.querySelectorAll('.preview-item').forEach((item, i) => {
          item.classList.toggle('active', i === idx);
        });

        document.querySelectorAll('.clothing-dot').forEach((dot, i) => {
          dot.classList.toggle('active', i === idx);
        });
      }

      function closePreview() {
        document.getElementById('preview-modal').classList.remove('active');
        currentPreviewId = null;
      }

      document.getElementById('preview-modal').addEventListener('click', (e) => {
        if (e.target.id === 'preview-modal') {
          closePreview();
        }
      });

      renderOutfits();
